spring.application.name=api-gateway
server.port=8080
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Routing Configuration
spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.routes[1].id=policy-service
spring.cloud.gateway.routes[1].uri=lb://POLICY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/policies/**

spring.cloud.gateway.routes[2].id=claim-service
spring.cloud.gateway.routes[2].uri=lb://CLAIM-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/claims/**
eureka.instance.prefer-ip-address=true

# CORS Configuration for Frontend Access
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*