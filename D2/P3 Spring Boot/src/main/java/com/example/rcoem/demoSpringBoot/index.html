<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Catcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        h1 {
            margin-top: 20px;
        }
        canvas {
            background-color: #ecf0f1;
            border: 4px solid #34495e;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-top: 10px;
        }
        .instructions {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<h1>Football Catcher</h1>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<div class="instructions">Use the <strong>Left</strong> and <strong>Right</strong> arrow keys to move your player!</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game Variables
    let score = 0;
    let gameOver = false;
    let animationId;

    // Player (The Paddle)
    const player = {
        x: canvas.width / 2 - 40,
        y: canvas.height - 30,
        width: 80,
        height: 15,
        speed: 7,
        dx: 0
    };

    // The Footballs
    const balls = [];
    const ballRadius = 12;

    function createBall() {
        const x = Math.random() * (canvas.width - ballRadius * 2) + ballRadius;
        balls.push({ x: x, y: -ballRadius, speed: 2 + Math.random() * 3 });
    }

    // Draw Player
    function drawPlayer() {
        ctx.fillStyle = "#e74c3c"; // Red paddle
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.width, player.height, 5);
        ctx.fill();
        ctx.closePath();
    }

    // Draw Footballs
    function drawBalls() {
        ctx.fillStyle = "#27ae60"; // Green balls (placeholder for footballs)
        balls.forEach(ball => {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        });
    }

    // Draw Score
    function drawScore() {
        ctx.font = "20px Arial";
        ctx.fillStyle = "#34495e";
        ctx.fillText("Score: " + score, 10, 30);
    }

    // Move Player
    function movePlayer() {
        player.x += player.dx;

        // Wall collision
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    }

    // Update Game State
    function update() {
        if (gameOver) return;

        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawPlayer();
        drawBalls();
        drawScore();
        movePlayer();

        // Move and check balls
        for (let i = 0; i < balls.length; i++) {
            balls[i].y += balls[i].speed;

            // Check collision with player
            if (
                balls[i].y + ballRadius >= player.y &&
                balls[i].x >= player.x &&
                balls[i].x <= player.x + player.width
            ) {
                balls.splice(i, 1); // Remove ball
                score += 10;
                i--;
                continue;
            }

            // Check if ball hits the ground (Game Over condition)
            if (balls[i].y - ballRadius > canvas.height) {
                gameOver = true;
                ctx.font = "40px Arial";
                ctx.fillStyle = "#c0392b";
                ctx.fillText("GAME OVER", canvas.width / 2 - 120, canvas.height / 2);
                ctx.font = "20px Arial";
                ctx.fillText("Final Score: " + score, canvas.width / 2 - 65, canvas.height / 2 + 40);
                cancelAnimationFrame(animationId);
                return;
            }
        }

        // Randomly generate new balls
        if (Math.random() < 0.02) {
            createBall();
        }

        animationId = requestAnimationFrame(update);
    }

    // Keyboard Event Listeners
    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") player.dx = player.speed;
        else if (e.key === "ArrowLeft") player.dx = -player.speed;
    });

    document.addEventListener("keyup", (e) => {
        if (e.key === "ArrowRight" || e.key === "ArrowLeft") player.dx = 0;
    });

    // Start Game
    update();

</script>
</body>
</html>
